name: ML CI Pipeline
on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
         
      - name: Install Dependencies
        run: pip install -r requirements.txt  
            

      - name: Run Tests
        run: pytest

      - name: Build Docker Image
        run: docker build -t ml-devops-demo. 

      - name: Run Docker COntainer
        run: docer run ml-devops-demo
        
      - name: Deploy Container
        run: docker run ml-devops-demo  
